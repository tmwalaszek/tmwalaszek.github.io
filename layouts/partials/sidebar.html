<aside class="post-sidebar" aria-label="All posts">
    <p class="sidebar-eyebrow">All writing</p>
    <nav class="sidebar-posts">
        {{ $current := . }}
        {{ range (where .Site.RegularPages "Type" "posts").ByDate.Reverse }}
        <a href="{{ .Permalink }}" class="sidebar-post {{ if eq $current.RelPermalink .RelPermalink }}is-active{{ end }}">
            <time datetime="{{ .Date.Format "2006-01-02" }}">{{ .Date.Format "Jan 2, 2006" }}</time>
            <span class="sidebar-post-title">{{ .Title }}</span>
        </a>
        {{ end }}
    </nav>
</aside>
