{{ define "main" }}
<section class="wrap">
    <header class="page-header">
        <p class="section-eyebrow">Tag</p>
        <h1 class="page-title">{{ .Title }}</h1>
        {{ with .Params.description }}<p class="page-lede">{{ . }}</p>{{ end }}
    </header>

    <ol class="post-index">
        {{ range .Pages }}
        <li class="post-index-item">
            <a href="{{ .Permalink }}" class="post-index-link">
                <time class="post-index-date" datetime="{{ .Date.Format "2006-01-02" }}">{{ .Date.Format "Jan 2, 2006" }}</time>
                <span class="post-index-title">{{ .Title }}</span>
            </a>
        </li>
        {{ end }}
    </ol>
</section>
{{ end }}
