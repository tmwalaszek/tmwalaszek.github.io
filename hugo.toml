baseURL = 'https://tmwalaszek.github.io/'
languageCode = 'en-us'
title = 'tmw'

enableRobotsTXT = true
summaryLength = 40

[params]
  description = "Just me, thinking out loud."
  author = "Tomasz Walaszek"
  email = "tomasz@walaszek.net"

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true
  [markup.highlight]
    style = 'github'
    lineNos = false
    noClasses = false
    tabWidth = 2
  [markup.tableOfContents]
    startLevel = 2
    endLevel = 4

[taxonomies]
  tag = "tags"
